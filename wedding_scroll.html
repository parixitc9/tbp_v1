<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scroll Film — The Brown Print</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    /* Prevent default scrolling behaviors during loading, standardise dark theme */
    body {
      background-color: var(--stone-950);
      color: var(--stone-100);
      margin: 0;
      padding: 0;
      user-select: none;
      -webkit-user-select: none;
    }

    /* Scroll container sets the scrollable height */
    .scroll-container {
      height: 800vh; /* 8x viewport height for detailed, smooth scroll */
      position: relative;
      background-color: var(--stone-950);
    }

    /* Canvas is fixed to viewport */
    .canvas-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      background-color: var(--stone-950);
    }

    #scroll-canvas {
      display: block;
      width: 100vw;
      height: 100vh;
    }

    /* Interactive / UI Layer */
    .ui-layer {
      position: fixed;
      inset: 0;
      z-index: 10;
      pointer-events: none;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 2rem;
      box-sizing: border-box;
    }

    /* Top Navigation bar */
    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      pointer-events: auto;
    }

    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.75rem;
      color: var(--stone-300);
      font-size: 0.85rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      text-decoration: none;
      padding: 0.75rem 1.5rem;
      border: 1px solid rgba(214, 211, 209, 0.15);
      border-radius: 9999px;
      background: rgba(12, 10, 9, 0.6);
      backdrop-filter: blur(8px);
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .back-btn:hover {
      color: var(--gold-400);
      border-color: var(--gold-400);
      background: rgba(20, 18, 17, 0.8);
      transform: translateY(-2px);
      box-shadow: 0 4px 20px rgba(212, 178, 95, 0.15);
    }

    .back-btn svg {
      transition: transform 0.3s ease;
    }

    .back-btn:hover svg {
      transform: translateX(-4px);
    }

    /* Cinematic Preloader overlay */
    .loader-overlay {
      position: fixed;
      inset: 0;
      z-index: 100;
      background-color: var(--stone-950);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      opacity: 1;
      transition: opacity 0.8s cubic-bezier(0.76, 0, 0.24, 1);
    }

    .loader-content {
      text-align: center;
      max-width: 320px;
      width: 90%;
    }

    .loader-logo {
      font-size: 2.25rem;
      color: var(--gold-400);
      margin-bottom: 0.25rem;
      text-shadow: 0 0 30px rgba(212, 178, 95, 0.2);
    }

    .loader-kicker {
      font-size: 0.7rem;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: var(--stone-500);
      margin-bottom: 3rem;
      display: block;
    }

    .progress-bar-container {
      width: 100%;
      height: 2px;
      background-color: var(--stone-800);
      border-radius: 9999px;
      overflow: hidden;
      margin-bottom: 1rem;
      position: relative;
    }

    .progress-bar-fill {
      width: 0%;
      height: 100%;
      background-color: var(--gold-400);
      transition: width 0.1s ease-out;
      box-shadow: 0 0 10px var(--gold-400);
    }

    .loader-percentage {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: 1.25rem;
      color: var(--stone-300);
    }

    /* Scroll indicator */
    .scroll-indicator {
      align-self: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
      color: var(--stone-400);
      opacity: 1;
      transition: opacity 0.6s cubic-bezier(0.16, 1, 0.3, 1);
      margin-bottom: 2rem;
    }

    .scroll-indicator.hidden {
      opacity: 0;
      transform: translateY(10px);
    }

    .scroll-indicator-text {
      font-size: 0.75rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
    }

    /* Pulsing scroll wheel animation */
    .mouse-icon {
      width: 24px;
      height: 40px;
      border: 2px solid var(--stone-400);
      border-radius: 12px;
      position: relative;
      background: rgba(12, 10, 9, 0.4);
      backdrop-filter: blur(4px);
    }

    .mouse-wheel {
      width: 4px;
      height: 8px;
      background-color: var(--gold-400);
      border-radius: 2px;
      position: absolute;
      top: 6px;
      left: 50%;
      transform: translateX(-50%);
      animation: scrollPulse 1.8s infinite;
      box-shadow: 0 0 6px var(--gold-400);
    }

    @keyframes scrollPulse {
      0% {
        opacity: 0;
        transform: translate(-50%, 0);
      }
      20% {
        opacity: 1;
      }
      60% {
        opacity: 0.1;
        transform: translate(-50%, 14px);
      }
      100% {
        opacity: 0;
        transform: translate(-50%, 0);
      }
    }

    /* Editorial Text Overlays */
    .editorial-overlays {
      position: absolute;
      inset: 0;
      pointer-events: none;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .poetic-text {
      position: absolute;
      text-align: center;
      font-family: 'Playfair Display', serif;
      font-size: 2.25rem;
      font-style: italic;
      color: var(--stone-50);
      width: 85%;
      max-width: 680px;
      line-height: 1.5;
      text-shadow: 0 4px 24px rgba(0, 0, 0, 0.9), 0 2px 8px rgba(0, 0, 0, 0.5);
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 0.8s cubic-bezier(0.16, 1, 0.3, 1), transform 1.2s cubic-bezier(0.16, 1, 0.3, 1);
    }

    /* Visual highlight for key words */
    .poetic-text span.gold {
      color: var(--gold-400);
      text-shadow: 0 0 25px rgba(212, 178, 95, 0.15);
    }

    .poetic-text.active {
      opacity: 1;
      transform: translateY(0);
    }

    /* Desktop and responsive styling */
    @media (max-width: 768px) {
      .poetic-text {
        font-size: 1.75rem;
      }
      .back-btn {
        padding: 0.6rem 1.2rem;
        font-size: 0.8rem;
      }
      .loader-logo {
        font-size: 1.75rem;
      }
    }
  </style>
</head>

<body>
  <!-- Grain Overlay for cinematic texture -->
  <div class="grain"></div>

  <!-- Preloader overlay screen -->
  <div class="loader-overlay" id="loader">
    <div class="loader-content">
      <div class="loader-logo bebas">THE BROWN PRINT</div>
      <span class="loader-kicker">Weddings</span>
      
      <div class="progress-bar-container">
        <div class="progress-bar-fill" id="progress-fill"></div>
      </div>
      
      <div class="loader-percentage" id="loader-percent">0%</div>
    </div>
  </div>

  <!-- UI & Controls Layer (fixed overlay) -->
  <div class="ui-layer">
    <div class="top-bar">
      <a href="wedding.html" class="back-btn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <line x1="19" y1="12" x2="5" y2="12"></line>
          <polyline points="12 19 5 12 12 5"></polyline>
        </svg>
        Back to Weddings
      </a>
    </div>

    <!-- Editorial Floating Subtitles -->
    <div class="editorial-overlays">
      <div class="poetic-text" id="text-1">A story of warmth, colour, and <span class="gold">quiet emotion</span>.</div>
      <div class="poetic-text" id="text-2">From the sacred rituals to the <span class="gold">last dance</span>.</div>
      <div class="poetic-text" id="text-3">Moments preserved to live <span class="gold">forever</span>.</div>
    </div>

    <!-- Scroll Indicator mouse -->
    <div class="scroll-indicator" id="scroll-prompt">
      <div class="mouse-icon">
        <div class="mouse-wheel"></div>
      </div>
      <div class="scroll-indicator-text">Scroll to play film</div>
    </div>
  </div>

  <!-- Canvas Container (fixed in background) -->
  <div class="canvas-container">
    <canvas id="scroll-canvas"></canvas>
  </div>

  <!-- Scroll Container (defines the scroll heights) -->
  <div class="scroll-container" id="scroll-height-spacer"></div>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const canvas = document.getElementById("scroll-canvas");
      const context = canvas.getContext("2d");
      const loaderOverlay = document.getElementById("loader");
      const progressFill = document.getElementById("progress-fill");
      const loaderPercent = document.getElementById("loader-percent");
      const scrollPrompt = document.getElementById("scroll-prompt");

      // Select subtitle blocks
      const subtitles = [
        { el: document.getElementById("text-1"), min: 0.15, max: 0.38 },
        { el: document.getElementById("text-2"), min: 0.45, max: 0.68 },
        { el: document.getElementById("text-3"), min: 0.75, max: 0.93 }
      ];

      const frameCount = 206;
      const images = [];
      let loadedCount = 0;

      // Construct file paths dynamically (ezgif-frame-001.jpg -> ezgif-frame-206.jpg)
      const getFramePath = (index) => {
        const paddedIndex = String(index).padStart(3, '0');
        return `ezgif-112f62a00cb0e067-jpg/ezgif-frame-${paddedIndex}.jpg`;
      };

      // Preloading process
      function preloadImages() {
        for (let i = 1; i <= frameCount; i++) {
          const img = new Image();
          img.onload = () => {
            loadedCount++;
            const pct = Math.round((loadedCount / frameCount) * 100);
            progressFill.style.width = `${pct}%`;
            loaderPercent.textContent = `${pct}%`;

            if (loadedCount === frameCount) {
              setTimeout(initCanvasAnimation, 400); // Small visual buffer for loading complete
            }
          };
          img.onerror = () => {
            console.error("Failed to load frame path: " + img.src);
            // Increment loaded count anyway to avoid blocking the loader
            loadedCount++;
            if (loadedCount === frameCount) {
              setTimeout(initCanvasAnimation, 400);
            }
          };
          img.src = getFramePath(i);
          images.push(img);
        }
      }

      // Initialize after images are preloaded
      let targetFrame = 0;
      let currentFrame = 0;
      let animationStarted = false;

      function initCanvasAnimation() {
        // Fade out loader overlay
        loaderOverlay.style.opacity = "0";
        setTimeout(() => {
          loaderOverlay.style.display = "none";
        }, 800);

        animationStarted = true;
        
        // Handle canvas sizing and draw initial frame
        resizeCanvas();
        
        // Start rendering loops
        requestAnimationFrame(animateLoop);
      }

      // Smooth scrolling listener
      window.addEventListener("scroll", () => {
        if (!animationStarted) return;
        
        const scrollTop = window.scrollY;
        const maxScroll = document.documentElement.scrollHeight - window.innerHeight;
        const fraction = maxScroll <= 0 ? 0 : scrollTop / maxScroll;
        
        // Fade scroll prompt as soon as scrolling starts
        if (scrollTop > 40) {
          scrollPrompt.classList.add("hidden");
        } else {
          scrollPrompt.classList.remove("hidden");
        }
        
        // Target frame mapped index between 0 and 205
        targetFrame = fraction * (frameCount - 1);
      });

      // Cover drawing logic (replicates CSS background-size: cover on canvas context)
      function drawImageProp(ctx, img, x, y, w, h, offsetX = 0.5, offsetY = 0.5) {
        const iw = img.width;
        const ih = img.height;
        const r = Math.min(w / iw, h / ih);
        let nw = iw * r;
        let nh = ih * r;
        let cx = 0, cy = 0, cw = iw, ch = ih, ar = 1;

        if (nw < w) ar = w / nw;
        if (Math.abs(nh - h) < 0.00001 && ar < 1) ar = h / nh;
        nw *= ar;
        nh *= ar;

        cw = iw / (nw / w);
        ch = ih / (nh / h);

        cx = (iw - cw) * offsetX;
        cy = (ih - ch) * offsetY;

        // Clip source parameters
        if (cx < 0) cx = 0;
        if (cy < 0) cy = 0;
        if (cw > iw) cw = iw;
        if (ch > ih) ch = ih;

        ctx.drawImage(img, cx, cy, cw, ch, x, y, w, h);
      }

      // Set scale and size parameters for Canvas
      function resizeCanvas() {
        if (!canvas) return;
        const dpr = window.devicePixelRatio || 1;
        const width = window.innerWidth;
        const height = window.innerHeight;

        canvas.width = width * dpr;
        canvas.height = height * dpr;
        canvas.style.width = `${width}px`;
        canvas.style.height = `${height}px`;

        context.scale(dpr, dpr);
        renderFrame();
      }

      // Render single frame on screen
      function renderFrame() {
        const idx = Math.round(currentFrame);
        if (images[idx] && images[idx].complete) {
          context.clearRect(0, 0, window.innerWidth, window.innerHeight);
          drawImageProp(context, images[idx], 0, 0, window.innerWidth, window.innerHeight);
        }
      }

      // Manage active states of floating titles based on current frame position
      function updateSubtitles(fraction) {
        subtitles.forEach(sub => {
          if (fraction >= sub.min && fraction <= sub.max) {
            sub.el.classList.add("active");
          } else {
            sub.el.classList.remove("active");
          }
        });
      }

      // Interpolation animation loop for rendering
      function animateLoop() {
        if (!animationStarted) return;

        // Lerp speed calculation
        const diff = targetFrame - currentFrame;
        
        if (Math.abs(diff) < 0.001) {
          currentFrame = targetFrame;
        } else {
          // 0.12 scale creates smooth easing delay
          currentFrame += diff * 0.12;
        }

        renderFrame();
        
        // Update floating subtitles based on current interpolation ratio
        const currentFraction = currentFrame / (frameCount - 1);
        updateSubtitles(currentFraction);

        requestAnimationFrame(animateLoop);
      }

      // Handle window resizing
      window.addEventListener("resize", resizeCanvas);

      // Start preloader
      preloadImages();
    });
  </script>
</body>

</html>
